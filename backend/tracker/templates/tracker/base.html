<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>

    <!-- DaisyUI includes Tailwind CSS — single CDN link for both -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX — enables dynamic HTML updates without writing JavaScript -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-base-200 min-h-screen">

    <!-- Top navigation bar -->
    <nav class="navbar bg-base-100 shadow-lg px-6">
        <div class="flex-1">
            <a href="{% url 'tracker:dashboard' %}" class="text-xl font-bold">
                🎯 Job Tracker
            </a>
        </div>
        <div class="flex gap-4">
            <a href="{% url 'tracker:company_list' %}" class="btn btn-ghost btn-sm">Companies</a>
            <a href="{% url 'tracker:application_list' %}" class="btn btn-ghost btn-sm">Applications</a>
            <a href="{% url 'tracker:contact_list' %}" class="btn btn-ghost btn-sm">Contacts</a>
        </div>
    </nav>

    <!-- Main content area — each page fills this block -->
    <main class="container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
