# Nginx configuration for local development with Docker Compose.
# In production (K3s), Traefik handles routing — Nginx is not used there.

upstream django {
    # "web" is the service name in docker-compose — Docker resolves it
    # to the container's internal IP automatically
    server web:8000;
}

server {
    listen 80;

    # Serve static files directly from Nginx — much faster than Django
    # collectstatic copies them to /app/staticfiles inside the container
    location /static/ {
        alias /app/staticfiles/;
    }

    # All other requests go to Gunicorn
    location / {
        proxy_pass http://django;
        # Pass the real client IP and host to Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}