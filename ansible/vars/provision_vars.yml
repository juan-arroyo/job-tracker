# Non-sensitive provisioning variables — safe to commit to GitHub
# Sensitive values (IPs, Storage Box credentials, PAT) live in provision_secrets.yml encrypted with Ansible Vault

# Hetzner VPS public IPs — real values in provision_secrets.yml
k3s_server_ip: "<K3S_SERVER_IP>"
k3s_agent1_ip: "<K3S_AGENT1_IP>"
k3s_agent2_ip: "<K3S_AGENT2_IP>"

# Dedicated user for the GitHub Actions runner — avoids running CI/CD as root
runner_user: "github-runner"

# Second runner directory — clinic-k3s-pipeline runner lives in actions-runner, never touch it
runner_dir: "/home/github-runner/actions-runner-job-tracker"

# Project directory on the server — separate from clinic-manager to avoid conflicts
project_dir: "/home/github-runner/job-tracker"

# GitHub repo where the runner registers and the pipeline is triggered
github_repo: "juan-arroyo/job-tracker"

# Runner version — must match the version already working in clinic-k3s-pipeline
runner_version: "2.334.0"

# Storage Box connection details — real values in provision_secrets.yml
storagebox_host: "<STORAGEBOX_HOST>"
storagebox_user: "<STORAGEBOX_USER>"
storagebox_port: "<STORAGEBOX_PORT>"
storagebox_backup_file: "backup-latest.sql"