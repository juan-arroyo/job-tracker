# Inventory for the provisioning playbook
# Run from your local PC targeting the 3 Hetzner VPS via SSH

# Control-plane — runs K3s server, GitHub Actions runner, and Ansible
[k3s_server]
46.62.219.138

# Workers — only run containers, no control-plane responsibilities
[k3s_agents]
77.42.124.22
77.42.124.11

# Common variables for all servers
# Using root to allow full system configuration during provisioning
[all:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3