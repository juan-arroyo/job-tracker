apiVersion: apps/v1
kind: Deployment
metadata:
  # Name used to reference this Deployment
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            # Read credentials from the Secret — never hardcoded
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: job-tracker-secret
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: job-tracker-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: job-tracker-secret
                  key: DB_PASSWORD