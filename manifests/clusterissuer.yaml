apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  # Name referenced in ingress.yaml to request SSL certificates
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server — issues real trusted certificates
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email for expiry notifications from Let's Encrypt
    email: juanmnarroyo@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            # Traefik is the default Ingress Controller in K3s
            class: traefik